<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu | David Zbonski, LLC</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121820;
            --gold-primary: #cbd5e1;
            --gold-light: #f8fafc;
            --text-light: #e2e8f0;
            --text-muted: #94a3b8;
        }
        
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at top right, #3a4149 0%, #040811 60%, #000204 100%);
            color: var(--text-light);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background-attachment: fixed;
        }

        .header {
            padding: 1.5rem;
            text-align: center;
            border-bottom: 1px solid rgba(203, 213, 225, 0.15);
            background: transparent; border-bottom: none;
        }

        .logo-img {
            max-width: 180px;
            transition: transform 0.3s ease;
        }

        .logo-img:hover {
            transform: scale(1.05);
        }

        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 3rem 2rem;
            animation: fadeIn 1s ease-out;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            max-width: 900px;
            width: 100%;
        }

        .menu-item {
            background: transparent;
            border: 1px solid rgba(203, 213, 225, 0.2);
            border-radius: 6px;
            padding: 2.5rem 1rem;
            text-align: center;
            text-decoration: none;
            color: var(--text-light);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80px;
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .menu-item::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(203, 213, 225, 0.15) 0%, rgba(0,0,0,0) 100%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .menu-item:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: var(--gold-light);
            box-shadow: 0 12px 24px rgba(0,0,0,0.5), 0 0 15px rgba(203, 213, 225, 0.2);
            color: var(--gold-light);
            background-color: rgba(255, 255, 255, 0.05);
        }

        .menu-item:hover::before {
            opacity: 1;
        }

        .footer {
            padding: 2rem;
            text-align: center;
            background: transparent;
            border-top: 1px solid rgba(203, 213, 225, 0.1);
        }

        .disclaimer {
            max-width: 800px;
            margin: 0 auto;
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.7;
            font-weight: 300;
        }

        .disclaimer strong {
            color: var(--gold-primary);
            font-family: 'Cinzel', serif;
            letter-spacing: 1px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .menu-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="index.html">
            <img src="shiny1-logo-clean.png" alt="David Zbonski, LLC Logo" class="logo-img">
        </a>
    </header>

    <main class="main-content">
        <div class="menu-grid">
            <a href="who-am-i.html" class="menu-item">Who Am I?</a>
            <a href="recommendations.html" class="menu-item">My Recommendations</a>
            <a href="where-to-invest.html" class="menu-item">Where To Invest</a>
            <a href="what-to-invest-in.html" class="menu-item">What To Invest In</a>
            <a href="what-not-to-invest.html" class="menu-item">What NOT To Invest In</a>
        </div>
    </main>

    <footer class="footer">
        <p class="disclaimer">
            <strong>Disclaimer:</strong> This is generic advice. Contact me so that I can help you determine if this path is for you or if modifications are needed for your specific situation.
        </p>
    </footer>
</body>
</html>
