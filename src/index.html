<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>David Zbonski, LLC | Registered Investment Advisor</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121820;
            --gold-primary: #cbd5e1;
            --gold-light: #f8fafc;
            --text-light: #e2e8f0;
            --text-muted: #94a3b8;
        }
        
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(farthest-corner at 80% 0%, #4a5568 0%, #2d3748 30%, #040811 85%, #000204 100%);
            color: var(--text-light);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background-attachment: fixed;
        }

        .container {
            max-width: 600px;
            width: 90%;
            padding: 3rem 2rem;
            background: transparent;
            animation: fadeIn 1.2s ease-out;
        }

        .logo-img { max-width: 500px; width: 90%; mix-blend-mode: screen;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
            -webkit-mask-image: radial-gradient(ellipse at center, rgba(0,0,0,1) 50%, rgba(0,0,0,0) 90%);
            mask-image: radial-gradient(ellipse at center, rgba(0,0,0,1) 50%, rgba(0,0,0,0) 90%);
        }

        h1, h2 {
            font-family: 'Cinzel', serif;
            margin: 0.5rem 0;
        }

        h1 { 
            font-weight: 700;
            font-size: 1.75rem; 
            letter-spacing: 2px; 
            
        }

        h2 { 
            font-size: 1.1rem; 
            font-weight: 400; 
            letter-spacing: 1.5px; 
            color: var(--gold-light); 
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 0.5rem;
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .content {
            margin: 2rem 0;
            font-size: 1.1rem;
            line-height: 1.8;
            font-weight: 300;
        }

        .quote {
            font-style: italic;
            font-size: 1.2rem;
            margin: 2.5rem auto;
            color: var(--text-light);
            border-left: 2px solid var(--gold-primary);
            padding-left: 1.5rem;
            text-align: left;
            background: rgba(255,255,255,0.02);
            padding: 1.5rem;
            border-radius: 0 8px 8px 0;
        }

        .quote p {
            margin: 0.5rem 0;
        }

        .contact-prompt {
            color: var(--gold-light);
            font-size: 1.1rem;
            margin-top: 2rem;
        }

        .phone {
            font-size: 1.8rem;
            font-weight: 600;
            color: white;
            margin: 1rem 0 2.5rem 0;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(212,175,55,0.3);
            font-family: 'Cinzel', serif;
        }

        .btn-enter {
            display: inline-block;
            padding: 1rem 3.5rem;
            background: none;
            color: #121820;
            text-decoration: none;
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 4px;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(203, 213, 225, 0.3);
            text-transform: uppercase;
        }

        .btn-enter:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(203, 213, 225, 0.5);
            background: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }
    
        
        .chrome-text, h1, h2, p, .subtitle, .disclaimer, .phone, .quote {
            background: none;
            
            
            color: #e2e8f0 !important;
            text-shadow: 0px 1px 2px rgba(0,0,0,0.5);
        }

        /* Override links */
        .menu-item, .btn-enter, .btn-back {
            background: none;
            
            
            color: #e2e8f0 !important;
            text-shadow: 0px 1px 2px rgba(0,0,0,0.5);
            border-color: #cbd5e1;
        }
        
        .menu-item:hover, .btn-enter:hover, .btn-back:hover {
            background: none;
            
            
            text-shadow: 0px 0px 15px rgba(255,255,255,0.8);
            color: #e2e8f0 !important;
            border-color: #ffffff;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="large-chrome-logo-April2026.png" alt="David Zbonski, LLC Logo" class="logo-img">
        
        <h1 class="chrome-text">David Zbonski, LLC</h1>
        <h2 class="chrome-text">Registered Investment Advisor</h2>
                <div class="content">
            <div class="quote">
                <p class="chrome-text">Without a plan, you don't know where you will end up.</p>
                <p class="chrome-text">With a plan, you know where you are going.</p>
            </div>
            
            <p class="chrome-text" class="contact-prompt">Call to get help creating a plan. Small starts are OK.</p>
            <canvas id="phoneCanvas" width="300" height="60" style="margin: 1rem 0 2.5rem 0; display: block; margin-left: auto; margin-right: auto;"></canvas>
        <script>
            const canvas = document.getElementById('phoneCanvas');
            const ctx = canvas.getContext('2d');
            ctx.font = '700 28px Cinzel, serif';
            let gradient = ctx.createLinearGradient(0, 0, canvas.width, 0);
            gradient.addColorStop(0, "#ffffff");
            gradient.addColorStop(0.25, "#f1f5f9");
            gradient.addColorStop(0.5, "#ffffff");
            gradient.addColorStop(0.75, "#e2e8f0");
            gradient.addColorStop(1, "#ffffff");
            ctx.fillStyle = gradient;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(255, 255, 255, 0.2)';
            ctx.shadowBlur = 8;
            ctx.fillText('865 - 855 - 4555', canvas.width/2, canvas.height/2);
        </script>
        </div>

        <a href="indexpage1.html" class="btn-enter">Enter</a>
    </div>

    
    <!-- Contact Section -->
    <div style="text-align: center; padding: 2rem 0; width: 100%;">
        <p class="chrome-text" style="font-size: 1.1rem; margin-bottom: 0.5rem; letter-spacing: 1px;">Contact</p>
        <a href="#" class="contactLink_footer chrome-text" style="text-decoration: underline; color: #cbd5e1; font-size: 1.1rem; cursor: pointer;">Email Me</a>
        <script>
            // Bot-protected email
            document.querySelectorAll('.contactLink_footer').forEach(function(link) {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    var u = 'dave';
                    var d = 'zbonski.com';
                    window.location.href = 'mailto:' + u + '@' + d;
                });
            });
        </script>
    </div>
    <footer id="disclosures-footer" style="margin-top: 4rem; padding: 1.5rem 0; width: 100%; text-align: center; background: transparent;">
        <a href="disclosures.html" style="font-size: 0.8rem; color: #94a3b8; text-decoration: none; font-family: 'Inter', sans-serif; letter-spacing: 1px; transition: color 0.3s ease;">Disclosures</a>
        <span style="font-size: 0.8rem; color: #94a3b8; margin: 0 10px;">|</span>
        <a href="privacy.html" style="font-size: 0.8rem; color: #94a3b8; text-decoration: none; font-family: 'Inter', sans-serif; letter-spacing: 1px; transition: color 0.3s ease;">Privacy Policy</a>
    </footer>

</body>
</html>
