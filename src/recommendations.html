<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Recommendations | David Zbonski, LLC</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121820;
            --gold-primary: #cbd5e1;
            --gold-light: #f8fafc;
            --text-light: #e2e8f0;
        }
        
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(farthest-corner at 80% 0%, #4a5568 0%, #2d3748 30%, #040811 85%, #000204 100%);
            color: var(--text-light);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background-attachment: fixed;
        }

        .container {
            max-width: 800px;
            width: 90%;
            padding: 4rem 2rem;
            background: transparent;
            animation: fadeIn 1s ease-out;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 2.5rem;
            margin-bottom: 2rem;
            
        }

        p {
            font-size: 1.2rem;
            font-weight: 300;
            margin-bottom: 3rem;
            line-height: 1.6;
            color: #94a3b8;
        }

        .btn-back {
            display: inline-block;
            padding: 1rem 3rem;
            background: transparent;
            color: var(--gold-light);
            text-decoration: none;
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 4px;
            border: 1px solid var(--gold-primary);
            letter-spacing: 2px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .btn-back:hover {
            background: rgba(203, 213, 225, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(203, 213, 225, 0.2);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    
        
        .chrome-text, h1, h2, p, .subtitle, .disclaimer, .phone, .quote {
            background: none;
            
            
            color: #e2e8f0 !important;
            text-shadow: 0px 1px 2px rgba(0,0,0,0.5);
        }

        /* Override links */
        .menu-item, .btn-enter, .btn-back {
            background: none;
            
            
            color: #e2e8f0 !important;
            text-shadow: 0px 1px 2px rgba(0,0,0,0.5);
            border-color: #cbd5e1;
        }
        
        .menu-item:hover, .btn-enter:hover, .btn-back:hover {
            background: none;
            
            
            text-shadow: 0px 0px 15px rgba(255,255,255,0.8);
            color: #e2e8f0 !important;
            border-color: #ffffff;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html">
            <img src="shiny1-logo-chrome.png" alt="David Zbonski, LLC Logo" style="max-width: 300px; width: 90%; mix-blend-mode: screen;; margin-bottom: 2rem; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));">
        </a>
        <h1 class="chrome-text">My Recommendations</h1>
        <p class="chrome-text">This section is currently under construction. Please check back later for detailed insights and advice tailored to your financial goals.</p>
        <a href="indexpage1.html" class="btn-back">Back to Menu</a>
    </div>

    <footer id="disclosures-footer" style="margin-top: 4rem; padding: 1.5rem 0; width: 100%; text-align: center; background: transparent;">
        <a href="disclosures.html" style="font-size: 0.8rem; color: #94a3b8; text-decoration: none; font-family: 'Inter', sans-serif; letter-spacing: 1px; transition: color 0.3s ease;">Disclosures & Privacy Policy</a>
    </footer>

</body>
</html>
